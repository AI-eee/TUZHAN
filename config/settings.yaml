# TUZHAN 运行环境配置

development:
  # 本地开发环境：仅本地可访问
  server_bind_host: "0.0.0.0"
  # [修改原因]: 本地和正式服统一使用 8888 端口
  server_bind_port: 8888
  # 客户端在本地请求时的默认地址
  client_base_url: "http://127.0.0.1:8888"
  # [修改原因]: 引入开发环境数据库路径
  database_url: "sqlite:///./data/dev.sqlite"

production:
  # 线上正式环境：监听所有网卡，对外提供服务
  # 服务器所在主机的公网IP是 118.145.237.44，但由于绑定时通常填 0.0.0.0 以监听外部请求
  server_bind_host: "127.0.0.1"
  # 正式应用监听 8889，由 Nginx 在 8888 端口反向代理
  server_bind_port: 8889
  # 客户端在本地请求正式服时的地址
  client_base_url: "http://118.145.237.44:8888"
  # [修改原因]: 引入正式环境数据库路径
  database_url: "sqlite:///./data/prod.sqlite"
