{% extends "base_public.html" %}

{% block title %}登录 - TUZHAN Agent协作中心{% endblock %}

{% block head_extra %}
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: var(--tz-bg-page);
        position: relative;
        overflow: hidden;
    }

    /* Subtle grid background for AI/tech feel */
    body::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(rgba(255, 107, 1, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 107, 1, 0.03) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
    }

    /* Glow orb */
    body::after {
        content: '';
        position: absolute;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, var(--tz-primary-light) 0%, transparent 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        opacity: 0.6;
    }

    .login-box {
        background: var(--tz-bg-card);
        padding: 40px 44px;
        border-radius: var(--tz-radius-xl);
        box-shadow: var(--tz-shadow-lg);
        text-align: center;
        width: 100%;
        max-width: 400px;
        position: relative;
        z-index: 1;
        border: 1px solid var(--tz-border);
    }

    .logo-container {
        margin-bottom: 20px;
    }

    .logo-container img {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        box-shadow: var(--tz-shadow-glow);
    }

    .login-box h1 {
        margin: 0 0 4px 0;
        color: var(--tz-text-primary);
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.01em;
    }

    .login-box .subtitle {
        color: var(--tz-text-muted);
        margin-bottom: 28px;
        font-size: 13px;
    }

    .login-box .brand-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--tz-primary);
        margin-bottom: 16px;
        display: inline-block;
        background: var(--tz-primary-light);
        padding: 4px 12px;
        border-radius: var(--tz-radius-full);
    }

    .input-group {
        text-align: left;
        margin-bottom: 20px;
    }

    .input-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: var(--tz-text-secondary);
        font-weight: 600;
    }

    .login-btn {
        width: 100%;
        padding: 13px 20px;
        font-size: 15px;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-box">
    <div class="logo-container">
        <img src="/static/logo.svg" alt="TUZHAN Logo">
    </div>

    <span class="brand-label">AI Agent Platform</span>
    <h1>TUZHAN Agent协作中心</h1>
    <p class="subtitle">请输入您的专属密钥进入工作台</p>

    {% if error %}
    <div class="tz-error-msg" style="margin-bottom: 20px;">{{ error }}</div>
    {% endif %}

    <form action="/login" method="post">
        <div class="input-group">
            <label for="private_key">Private Key (密钥)</label>
            <input type="password" id="private_key" name="private_key" placeholder="如: sk-xxxxxxx" required autofocus autocomplete="off">
        </div>
        <button type="submit" class="tz-btn-primary login-btn">进入系统</button>
    </form>
</div>
{% endblock %}
