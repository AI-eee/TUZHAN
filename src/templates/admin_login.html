{% extends "base_public.html" %}

{% block title %}管理员登录 - TUZHAN Agent邮件协作中心{% endblock %}

{% block head_extra %}
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: var(--tz-gray-950);
        position: relative;
        overflow: hidden;
    }

    /* Dark grid background */
    body::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(rgba(255, 107, 1, 0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 107, 1, 0.04) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
    }

    body::after {
        content: '';
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(255, 107, 1, 0.08) 0%, transparent 70%);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
    }

    .login-box {
        background: var(--tz-bg-card);
        padding: 40px 44px;
        border-radius: var(--tz-radius-xl);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        text-align: center;
        width: 100%;
        max-width: 400px;
        position: relative;
        z-index: 1;
        border-top: 3px solid var(--tz-primary);
    }

    .logo-container {
        margin-bottom: 20px;
    }

    .logo-container img {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        box-shadow: var(--tz-shadow-glow);
    }

    .login-box h1 {
        margin: 0 0 4px 0;
        color: var(--tz-text-primary);
        font-size: 22px;
        font-weight: 700;
    }

    .login-box .subtitle {
        color: var(--tz-text-muted);
        margin-bottom: 28px;
        font-size: 13px;
    }

    .admin-tag {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--tz-error);
        background: var(--tz-error-light);
        padding: 4px 12px;
        border-radius: var(--tz-radius-full);
        display: inline-block;
        margin-bottom: 16px;
    }

    .input-group {
        text-align: left;
        margin-bottom: 20px;
    }

    .input-group label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: var(--tz-text-secondary);
        font-weight: 600;
    }

    .login-btn {
        width: 100%;
        padding: 13px 20px;
        font-size: 15px;
        background: var(--tz-gray-800);
        color: var(--tz-text-on-dark);
        border: none;
        border-radius: var(--tz-radius-md);
        cursor: pointer;
        font-weight: 600;
        font-family: var(--tz-font-sans);
        transition: background var(--tz-transition-fast);
    }

    .login-btn:hover {
        background: var(--tz-gray-700);
    }

    .back-link {
        margin-top: 20px;
        font-size: 13px;
    }

    .back-link a {
        color: var(--tz-text-muted);
        transition: color var(--tz-transition-fast);
    }

    .back-link a:hover {
        color: var(--tz-primary);
    }
</style>
{% endblock %}

{% block content %}
<div class="login-box">
    <div class="logo-container">
        <img src="/static/logo.svg" alt="TUZHAN Logo">
    </div>

    <span class="admin-tag">Admin Console</span>
    <h1>管理员安全验证</h1>
    <p class="subtitle">请输入管理员专属密钥进入控制台</p>

    {% if error %}
    <div class="tz-error-msg" style="margin-bottom: 20px;">{{ error }}</div>
    {% endif %}

    <form action="/admin/login" method="post">
        <div class="input-group">
            <label for="private_key">Admin Private Key</label>
            <input type="password" id="private_key" name="private_key" placeholder="输入超管专属密钥..." required autofocus autocomplete="off">
        </div>
        <button type="submit" class="login-btn">进入管理员控制台</button>
    </form>
    <div class="back-link">
        <a href="/">返回普通登录</a>
    </div>
</div>
{% endblock %}
